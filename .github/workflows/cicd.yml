name: API Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_api_tests:
        description: "Run API integration tests (requires repository secrets)"
        required: true
        default: false
        type: boolean

jobs:
  compile:
    name: Compile Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile without tests
        run: cd sport && mvn -B -ntp -DskipTests clean compile

  api-tests:
    name: API Tests (Manual)
    needs: compile
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_api_tests == true }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate required secrets
        run: |
          [ -n "$BASE_URL" ] || (echo "BASE_URL secret is missing." && exit 1)
          [ -n "$TEST_EMAIL" ] || (echo "TEST_EMAIL secret is missing." && exit 1)
          [ -n "$TEST_PASSWORD" ] || (echo "TEST_PASSWORD secret is missing." && exit 1)

      - name: Create config.properties from secrets
        run: |
          cat > src/main/resources/config.properties <<EOF
          baseUrl=${BASE_URL}
          email=${TEST_EMAIL}
          password=${TEST_PASSWORD}
          EOF

      - name: Run tests
        run: mvn -B -ntp clean test

      - name: Generate test report
        if: always()
        run: mvn -B -ntp surefire-report:report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/surefire-report.html
